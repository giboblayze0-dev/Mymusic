<body>

<h2>🎵 Upload Song Admin Panel</h2>

<input type="text" id="title" placeholder="Song Title">
<input type="text" id="artist" placeholder="Artist Name">
<select id="type">
  <option value="new">New</option>
  <option value="trending">Trending</option>
  <option value="albums">Albums</option>
</select>

<input type="file" id="image">
<input type="file" id="audio">

<button onclick="uploadSong()">Upload Song</button>

<p id="status"></p>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_SUPABASE_ANON_KEY"
);

// UPLOAD FUNCTION
window.uploadSong = async function () {

  const title = document.getElementById("title").value;
  const artist = document.getElementById("artist").value;
  const type = document.getElementById("type").value;

  const imageFile = document.getElementById("image").files[0];
  const audioFile = document.getElementById("audio").files[0];

  document.getElementById("status").innerText = "Uploading...";

  // 1. Upload image
  const imageName = Date.now() + "-" + imageFile.name;

  let { data: imgData, error: imgError } = await supabase
    .storage
    .from("images")
    .upload(imageName, imageFile);

  const imageUrl = supabase.storage
    .from("images")
    .getPublicUrl(imageName).data.publicUrl;

  // 2. Upload audio
  const audioName = Date.now() + "-" + audioFile.name;

  let { data: audioData, error: audioError } = await supabase
    .storage
    .from("music-files")
    .upload(audioName, audioFile);

  const audioUrl = supabase.storage
    .from("music-files")
    .getPublicUrl(audioName).data.publicUrl;

  // 3. Save to database
  const { data, error } = await supabase
    .from("songs")
    .insert([
      {
        title,
        artist,
        type,
        image_url: imageUrl,
        audio_url: audioUrl
      }
    ]);

  if (error) {
    document.getElementById("status").innerText = "❌ Error uploading";
    console.log(error);
  } else {
    document.getElementById("status").innerText = "✅ Upload successful!";
  }
};

</script>
